services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finlyhub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finlyhub}
      POSTGRES_USER: ${POSTGRES_USER:-finlyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finlyhub_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finlyhub} -d ${POSTGRES_DB:-finlyhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finlyhub-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/finlyhub}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-finlyhub}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-finlyhub_secret_2026}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_BASE_URL: http://ollama:11434/v1
      OPENAI_API_KEY: ollama
      OPENAI_MODEL: qwen2:0.5b
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-nomic-embed-text}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama
    container_name: finlyhub-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ""
    command: >
      sh -c '
        ollama serve &
        until ollama list > /dev/null 2>&1; do sleep 1; done &&
        ollama pull qwen2:0.5b &&
        ollama pull nomic-embed-text &&
        wait
      '
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finlyhub-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  ollama_data:
