databaseChangeLog:
  - changeSet:
      id: V015-1
      author: finlyhub
      context: demo
      changes:
        - insert:
            tableName: documents
            columns:
              - column:
                  name: user_id
                  valueComputed: (SELECT id FROM users WHERE email = 'accountant@finlyhub.com')
              - column:
                  name: filename
                  value: gaap_accounting_standards.pdf
              - column:
                  name: original_filename
                  value: gaap_accounting_standards.pdf
              - column:
                  name: content_type
                  value: application/pdf
              - column:
                  name: file_size
                  valueNumeric: 312000
              - column:
                  name: storage_path
                  value: /app/uploads/documents/demo_gaap_accounting_standards.pdf
              - column:
                  name: document_type
                  value: GUIDELINE
              - column:
                  name: status
                  value: INDEXED
              - column:
                  name: raw_text
                  value: >-
                    GAAP Accounting Standards Overview 2026. Section 1: Revenue
                    Recognition. Revenue is recognized when control of goods or services
                    is transferred to the customer at the transaction price. The five-step
                    model includes identifying the contract, performance obligations,
                    transaction price, allocation, and recognition. Section 2: Lease
                    Accounting. Lessees must recognize right-of-use assets and lease
                    liabilities for all leases longer than 12 months. Section 3: Inventory
                    Valuation. Inventory is measured at the lower of cost or net realizable
                    value. Common costing methods include FIFO, LIFO, and weighted average.
                    Section 4: Intangible Assets. Intangible assets with finite lives are
                    amortized over their useful life. Goodwill is tested annually for
                    impairment.
        - insert:
            tableName: documents
            columns:
              - column:
                  name: user_id
                  valueComputed: (SELECT id FROM users WHERE email = 'viewer@finlyhub.com')
              - column:
                  name: filename
                  value: quarterly_financial_guidelines.docx
              - column:
                  name: original_filename
                  value: quarterly_financial_guidelines.docx
              - column:
                  name: content_type
                  value: application/vnd.openxmlformats-officedocument.wordprocessingml.document
              - column:
                  name: file_size
                  valueNumeric: 156000
              - column:
                  name: storage_path
                  value: /app/uploads/documents/demo_quarterly_financial_guidelines.docx
              - column:
                  name: document_type
                  value: GUIDELINE
              - column:
                  name: status
                  value: INDEXED
              - column:
                  name: raw_text
                  value: >-
                    Quarterly Financial Reporting Guidelines 2026. All reports must be
                    submitted within 15 business days after quarter end. Each report should
                    include an income statement, balance sheet, cash flow statement, and
                    statement of retained earnings. Financial statements must comply with
                    GAAP standards. Key metrics to report include gross margin, operating
                    margin, EBITDA, net income, and earnings per share. Variance analysis
                    comparing actual results to budget and prior year is required for all
                    material line items. Management discussion and analysis should explain
                    significant trends and uncertainties.

