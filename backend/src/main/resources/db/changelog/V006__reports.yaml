databaseChangeLog:
  - changeSet:
      id: V006-1
      author: finlyhub
      changes:
        - createTable:
            tableName: reports
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reports_user
                    references: users(id)
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: subtype
                  type: VARCHAR(50)
              - column:
                  name: parameters
                  type: JSONB
              - column:
                  name: data
                  type: JSONB
              - column:
                  name: ai_insights
                  type: TEXT
              - column:
                  name: chart_config
                  type: JSONB
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
              - column:
                  name: export_format
                  type: VARCHAR(20)
              - column:
                  name: export_path
                  type: VARCHAR(1000)
              - column:
                  name: period_start
                  type: DATE
              - column:
                  name: period_end
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

  - changeSet:
      id: V006-2
      author: finlyhub
      changes:
        - createIndex:
            tableName: reports
            indexName: idx_reports_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: reports
            indexName: idx_reports_type
            columns:
              - column:
                  name: type
        - createIndex:
            tableName: reports
            indexName: idx_reports_period
            columns:
              - column:
                  name: period_start
              - column:
                  name: period_end
