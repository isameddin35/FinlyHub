databaseChangeLog:
  - changeSet:
      id: V004-1
      author: finlyhub
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_conversations_user
                    references: users(id)
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_messages_conversation
                    references: conversations(id)
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: sources
                  type: JSONB
              - column:
                  name: confidence_score
                  type: DECIMAL(5, 2)
              - column:
                  name: token_count
                  type: INTEGER
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

  - changeSet:
      id: V004-2
      author: finlyhub
      changes:
        - createIndex:
            tableName: conversations
            indexName: idx_conv_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: conversations
            indexName: idx_conv_active
            columns:
              - column:
                  name: is_active
        - createIndex:
            tableName: messages
            indexName: idx_messages_conversation
            columns:
              - column:
                  name: conversation_id
        - createIndex:
            tableName: messages
            indexName: idx_messages_created
            columns:
              - column:
                  name: created_at
