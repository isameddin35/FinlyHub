databaseChangeLog:
  - changeSet:
      id: V010-1
      author: finlyhub
      changes:
        - createTable:
            tableName: invoice_documents
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_inv_doc_user
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

  - changeSet:
      id: V010-2
      author: finlyhub
      changes:
        - dropForeignKeyConstraint:
            baseTableName: invoices
            constraintName: fk_invoices_document
        - addForeignKeyConstraint:
            baseTableName: invoices
            baseColumnNames: document_id
            constraintName: fk_invoices_document
            referencedTableName: invoice_documents
            referencedColumnNames: id

  - changeSet:
      id: V010-3
      author: finlyhub
      changes:
        - addColumn:
            tableName: document_chunks
            columns:
              - column:
                  name: filename
                  type: VARCHAR(500)
