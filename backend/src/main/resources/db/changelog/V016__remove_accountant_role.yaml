databaseChangeLog:
  - changeSet:
      id: V016-1
      author: isa
      changes:
        - sql:
            comment: Assign VIEWER role to users that only have ACCOUNTANT
            sql: |
              INSERT INTO user_roles (user_id, role_id)
              SELECT ur.user_id, r2.id
              FROM user_roles ur
              JOIN roles r ON r.id = ur.role_id
              CROSS JOIN roles r2
              WHERE r.name = 'ACCOUNTANT'
              AND r2.name = 'VIEWER'
              AND NOT EXISTS (
                SELECT 1 FROM user_roles ur2
                JOIN roles r3 ON r3.id = ur2.role_id
                WHERE ur2.user_id = ur.user_id
                AND r3.name = 'VIEWER'
              );
        - sql:
            comment: Remove all ACCOUNTANT role assignments
            sql: |
              DELETE FROM user_roles
              WHERE role_id = (SELECT id FROM roles WHERE name = 'ACCOUNTANT');
        - sql:
            comment: Delete ACCOUNTANT role
            sql: |
              DELETE FROM roles WHERE name = 'ACCOUNTANT';
