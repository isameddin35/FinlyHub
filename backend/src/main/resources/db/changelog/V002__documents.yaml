databaseChangeLog:
  - changeSet:
      id: V002-1
      author: finlyhub
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_documents_user
                    references: users(id)
              - column:
                  name: filename
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: original_filename
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: storage_path
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: UPLOADED
                  constraints:
                    nullable: false
              - column:
                  name: raw_text
                  type: TEXT
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

        - createTable:
            tableName: document_chunks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chunks_document
                    references: documents(id)
              - column:
                  name: chunk_index
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: token_count
                  type: INTEGER
              - column:
                  name: embedding
                  type: vector(1536)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

  - changeSet:
      id: V002-2
      author: finlyhub
      changes:
        - createIndex:
            tableName: documents
            indexName: idx_documents_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: documents
            indexName: idx_documents_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: documents
            indexName: idx_documents_type
            columns:
              - column:
                  name: document_type
        - createIndex:
            tableName: document_chunks
            indexName: idx_chunks_document
            columns:
              - column:
                  name: document_id
        - sql:
            sql: CREATE INDEX idx_chunks_embedding ON document_chunks USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100);
