databaseChangeLog:
  - changeSet:
      id: V005-1
      author: finlyhub
      changes:
        - createTable:
            tableName: transaction_categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: icon
                  type: VARCHAR(50)
              - column:
                  name: color
                  type: VARCHAR(7)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_user
                    references: users(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_transactions_category
                    references: transaction_categories(id)
              - column:
                  name: transaction_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: amount
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  defaultValue: USD
              - column:
                  name: reference
                  type: VARCHAR(255)
              - column:
                  name: vendor
                  type: VARCHAR(255)
              - column:
                  name: source
                  type: VARCHAR(50)
                  defaultValue: MANUAL
              - column:
                  name: suggested_category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_transactions_suggested
                    references: transaction_categories(id)
              - column:
                  name: confidence_score
                  type: DECIMAL(5, 2)
              - column:
                  name: categorization_status
                  type: VARCHAR(50)
                  defaultValue: PENDING
              - column:
                  name: user_approved
                  type: BOOLEAN
              - column:
                  name: approved_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: import_batch_id
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()

  - changeSet:
      id: V005-2
      author: finlyhub
      changes:
        - createIndex:
            tableName: transactions
            indexName: idx_tx_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: transactions
            indexName: idx_tx_date
            columns:
              - column:
                  name: transaction_date
        - createIndex:
            tableName: transactions
            indexName: idx_tx_status
            columns:
              - column:
                  name: categorization_status
        - createIndex:
            tableName: transactions
            indexName: idx_tx_batch
            columns:
              - column:
                  name: import_batch_id
        - createIndex:
            tableName: transactions
            indexName: idx_tx_category
            columns:
              - column:
                  name: category_id
        - createIndex:
            tableName: transactions
            indexName: idx_tx_suggested
            columns:
              - column:
                  name: suggested_category_id

