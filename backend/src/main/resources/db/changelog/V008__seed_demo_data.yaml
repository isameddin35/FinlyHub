  - changeSet:
      id: V008-8
      author: finlyhub
      context: demo
      changes:
        - insert:
            tableName: documents
            columns:
              - column:
                  name: user_id
                  valueComputed: (SELECT id FROM users WHERE email = 'admin@finlyhub.com')
              - column:
                  name: filename
                  value: tax_policy_2026.pdf
              - column:
                  name: original_filename
                  value: tax_policy_2026.pdf
              - column:
                  name: content_type
                  value: application/pdf
              - column:
                  name: file_size
                  valueNumeric: 245000
              - column:
                  name: storage_path
                  value: /app/uploads/documents/demo_tax_policy_2026.pdf
              - column:
                  name: document_type
                  value: POLICY
              - column:
                  name: status
                  value: INDEXED
              - column:
                  name: raw_text
                  value: >-
                    Small Business Tax Deductions Guide 2026. Section 1: Home Office
                    Deduction. Small business owners who use a portion of their home
                    exclusively for business may qualify for the home office deduction.
                    The simplified option allows $5 per square foot up to 300 square
                    feet. Section 2: Vehicle Expenses. Business owners can deduct
                    vehicle expenses using either the standard mileage rate of 67 cents
                    per mile or actual expense method. Section 3: Health Insurance
                    Premiums. Self-employed individuals may deduct 100% of health
                    insurance premiums for themselves and their dependents.
        - insert:
            tableName: documents
            columns:
              - column:
                  name: user_id
                  valueComputed: (SELECT id FROM users WHERE email = 'admin@finlyhub.com')
              - column:
                  name: filename
                  value: eu_vat_directive.docx
              - column:
                  name: original_filename
                  value: eu_vat_directive.docx
              - column:
                  name: content_type
                  value: application/vnd.openxmlformats-officedocument.wordprocessingml.document
              - column:
                  name: file_size
                  valueNumeric: 189000
              - column:
                  name: storage_path
                  value: /app/uploads/documents/demo_eu_vat_directive.docx
              - column:
                  name: document_type
                  value: POLICY
              - column:
                  name: status
                  value: INDEXED
              - column:
                  name: raw_text
                  value: >-
                    EU VAT Directive Summary 2026. Article 1: Standard VAT Rate. The
                    standard VAT rate shall be at least 15% and applies to most goods
                    and services. Article 2: Reduced Rates. Member states may apply
                    one or two reduced rates of at least 5% to specific categories
                    including food, water, pharmaceuticals, and medical equipment.
                    Article 3: VAT on Digital Services. Digital services supplied to
                    consumers are taxed in the member state of the consumer under the
                    One Stop Shop (OSS) scheme. Article 4: Exemptions. Certain
                    supplies including financial services, insurance, education, and
                    healthcare are exempt from VAT.

  - changeSet:
      id: V008-9
      author: finlyhub
      context: demo
      changes:
        - sql:
            sql: |
              INSERT INTO document_chunks (document_id, chunk_index, content, token_count, embedding, created_at)
              VALUES
                ((SELECT id FROM documents WHERE original_filename = 'tax_policy_2026.pdf'), 0,
                 'Small Business Tax Deductions Guide 2026. Section 1: Home Office Deduction. Small business owners who use a portion of their home exclusively for business may qualify for the home office deduction. The simplified option allows $5 per square foot up to 300 square feet.',
                 85, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW()),

                ((SELECT id FROM documents WHERE original_filename = 'tax_policy_2026.pdf'), 1,
                 'Section 2: Vehicle Expenses. Business owners can deduct vehicle expenses using either the standard mileage rate of 67 cents per mile or actual expense method. Section 3: Health Insurance Premiums. Self-employed individuals may deduct 100% of health insurance premiums for themselves and their dependents.',
                 72, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW()),

                ((SELECT id FROM documents WHERE original_filename = 'tax_policy_2026.pdf'), 2,
                 'Additional deductions include retirement plan contributions (SEP IRA, Solo 401k), business equipment and software depreciation under Section 179, and education expenses directly related to your current business.',
                 60, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW()),

                ((SELECT id FROM documents WHERE original_filename = 'eu_vat_directive.docx'), 0,
                 'EU VAT Directive Summary 2026. Article 1: Standard VAT Rate. The standard VAT rate shall be at least 15% and applies to most goods and services. Article 2: Reduced Rates. Member states may apply one or two reduced rates of at least 5% to specific categories including food, water, pharmaceuticals, and medical equipment.',
                 78, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW()),

                ((SELECT id FROM documents WHERE original_filename = 'eu_vat_directive.docx'), 1,
                 'Article 3: VAT on Digital Services. Digital services supplied to consumers are taxed in the member state of the consumer under the One Stop Shop (OSS) scheme. Article 4: Exemptions. Certain supplies including financial services, insurance, education, and healthcare are exempt from VAT.',
                 68, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW()),

                ((SELECT id FROM documents WHERE original_filename = 'eu_vat_directive.docx'), 2,
                 'Cross-border transactions within the EU are generally exempt from VAT when supplied to a registered business (B2B) under the reverse charge mechanism. B2C cross-border digital services are taxed at the rate applicable in the customer''s country.',
                 55, (SELECT ('[' || string_agg((random() * 2 - 1)::text, ',') || ']')::vector FROM generate_series(1,1536)), NOW());

  - changeSet:
      id: V008-10
      author: finlyhub
      context: demo
      changes:
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'Tax Policy Questions')
              - column:
                  name: role
                  value: USER
              - column:
                  name: content
                  value: What are the current tax deductions available for small businesses in 2026?
              - column:
                  name: token_count
                  valueNumeric: 15
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'Tax Policy Questions')
              - column:
                  name: role
                  value: ASSISTANT
              - column:
                  name: content
                  value: >-
                    Based on the documentation provided, here are the key tax deductions for small businesses in 2026:

                    1. **Home Office Deduction** - Up to $5/sq. ft. for up to 300 sq. ft. ($1,500 max) using the simplified method, or actual expenses for the dedicated business portion of your home.

                    2. **Vehicle Expenses** - 67 cents per mile standard mileage rate, or actual expense method (gas, maintenance, depreciation, insurance).

                    3. **Health Insurance Premiums** - 100% deduction for self-employed individuals and their dependents.

                    4. **Retirement Plans** - SEP IRA and Solo 401k contributions are deductible.

                    5. **Section 179** - Immediate expensing of business equipment and software up to $1,160,000.

                    6. **Education Expenses** - Training and education directly related to your current business.

                    Would you like more details on any of these deductions?
              - column:
                  name: token_count
                  valueNumeric: 148
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'Expense Reimbursement Policy')
              - column:
                  name: role
                  value: USER
              - column:
                  name: content
                  value: What is the company policy on expense reimbursements for business travel?
              - column:
                  name: token_count
                  valueNumeric: 14
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'Expense Reimbursement Policy')
              - column:
                  name: role
                  value: ASSISTANT
              - column:
                  name: content
                  value: >-
                    Based on available documentation, here is the company expense reimbursement policy:

                    **Travel Expenses:**
                    - Economy class flights for all domestic travel under 6 hours
                    - Business class permitted for international flights over 6 hours
                    - Hotel accommodations up to $250/night standard, $400/night for major cities
                    - Meals: $60/day for domestic, $100/day for international (receipts required over $25)

                    **Reimbursement Process:**
                    1. Submit itemized receipts within 30 days of expense
                    2. Use the expense report template in the accounting system
                    3. Manager approval required for expenses over $500
                    4. Finance processes reimbursements within 15 business days

                    **Non-Reimbursable:**
                    - Personal entertainment and leisure activities
                    - Alcoholic beverages over $20
                    - Upgrades not related to business necessity
                    - Late submission fees or penalties

                    Would you like me to clarify any specific aspect of the policy?
              - column:
                  name: token_count
                  valueNumeric: 178
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'VAT Rates for Services')
              - column:
                  name: role
                  value: USER
              - column:
                  name: content
                  value: What VAT rates apply to consulting services provided to EU clients?
              - column:
                  name: token_count
                  valueNumeric: 13
        - insert:
            tableName: messages
            columns:
              - column:
                  name: conversation_id
                  valueComputed: (SELECT id FROM conversations WHERE title = 'VAT Rates for Services')
              - column:
                  name: role
                  value: ASSISTANT
              - column:
                  name: content
                  value: >-
                    Based on the EU VAT Directive documentation, here is how VAT applies to consulting services:

                    **B2B Consulting Services (Business to Business):**
                    - The reverse charge mechanism applies when the recipient is a VAT-registered business in another EU member state
                    - No VAT is charged by the supplier; the recipient accounts for VAT in their own country
                    - The invoice must state "reverse charge" and include the recipient's VAT number

                    **B2C Consulting Services (Business to Consumer):**
                    - VAT is charged at the rate applicable in the supplier's country
                    - The standard rate applies (minimum 15% across EU)
                    - Reduced rates generally do NOT apply to consulting services

                    **Standard VAT Rates by Country (2026):**
                    - Germany: 19%
                    - France: 20%
                    - Netherlands: 21%
                    - Ireland: 23%
                    - Spain: 21%

                    Would you like more information about cross-border invoicing requirements?
              - column:
                  name: token_count
                  valueNumeric: 165

